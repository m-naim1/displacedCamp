<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Camp Manager</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main class="content content--full">
<div class="login-page">
  <div class="login-card">
    <h1>🏕️ Camp Manager</h1>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <div class="login-tabs">
      <button class="tab-btn active" onclick="showTab('staff')">Staff Login</button>
      <button class="tab-btn" onclick="showTab('family')">Family Login</button>
    </div>
    <form id="staff-login" method="POST" action="/portal/login">
      <label>Username</label>
      <input type="text" name="username" required>
      <label>Password</label>
      <input type="password" name="password" required>
      <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <form id="family-login" method="POST" action="/portal/family-login" style="display:none">
      <label>National ID</label>
      <input type="text" name="national_id" required>
      <label>Date of Birth</label>
      <input type="date" name="date_of_birth" required>
      <button type="submit" class="btn btn-primary">Login</button>
    </form>
  </div>
</div>
</main>
<script>
function showTab(tab) {
  document.getElementById('staff-login').style.display = tab === 'staff' ? 'block' : 'none';
  document.getElementById('family-login').style.display = tab === 'family' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(tab === 'staff' ? 'Staff' : 'Family')));
}
</script>
</body>
</html>
